<!-- Форма -->
<div class="section section_accent callback">
	<div class="container">
		<div class="callback__wrapper">
			<img src="assets/img/features/4.jpg" class="callback__img" width="450" height="330" alt="" loading="lazy" decoding="async" pic>
			<div class="callback__right">
				<h2 class="title-2 callback__title">@@title</h2>
				<div class="callback__subtitle">Оставьте заявку и наш администратор свяжется с вами и запишет на консультацию врача</div>
				<div class="form callback__form">
					<form>
						<div class="form__fields">
							<input class="input" type="text" name="name" placeholder="Ваше имя">
							<input class="input" type="tel" name="phone" placeholder="+7 (___) ___-__-__ *" required>
							<input class="input" type="email" name="email" placeholder="E-mail" required>
						</div>
						<button class="button submit">Отправить заявку</button>
						<label class="checkbox">
							<input class="checkbox__input" type="checkbox" required checked>
							<span class="checkbox__text">Нажимая на кнопку, вы соглашаетесь с <a href="javascript:void(0)" class="underline">Политикой конфиденциальности</a></span>
						</label>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
